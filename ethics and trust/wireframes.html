<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ethics & Trust Analyzer — Wireframes</title>
<meta name="viewport" content="width=1280" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --ink-2:#3a3a3a;
    --mute:#7a7a7a;
    --line:#c9c9c9;
    --line-2:#e2e2e2;
    --fill:#f3f2ef;
    --fill-2:#ebeae6;
    --paper:#faf8f3;
    --accent:#b8761a;        /* muted amber */
    --accent-soft:#f3e2c2;
    --scope-you:#2f6a3f;     /* muted moss */
    --scope-you-soft:#dbe8dd;
    --scope-collab:#6a5a2f;  /* muted ochre */
    --scope-collab-soft:#e8e1cc;
    --scope-out:#6a3030;     /* muted clay */
    --scope-out-soft:#e8d6d4;
    --sans:'Inter',system-ui,sans-serif;
    --hand:'Caveat',cursive;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{padding:0 0 80px 0}

  /* ============ TOP BAR ============ */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:14px 28px 0 28px;
  }
  .topbar-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand h1{
    font-family:var(--hand);
    font-weight:700;
    font-size:30px;
    margin:0;letter-spacing:.5px;
    white-space:nowrap;
  }
  .brand .sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--mute);
    text-transform:uppercase;letter-spacing:.12em;
  }
  .topbar-meta{
    font-family:var(--mono);font-size:11px;color:var(--mute);
    text-align:right;line-height:1.5;
  }
  .tabs{
    display:flex;gap:0;margin-top:16px;
  }
  .tab{
    font-family:var(--sans);
    font-size:13px;font-weight:500;
    padding:10px 18px 10px 18px;
    border:1px solid var(--line);
    border-bottom:none;
    background:var(--fill);
    color:var(--ink-2);
    cursor:pointer;
    border-top-left-radius:6px;border-top-right-radius:6px;
    margin-right:-1px;
    display:flex;align-items:center;gap:8px;
    transform:rotate(-.15deg);
  }
  .tab:nth-child(2){transform:rotate(.1deg)}
  .tab:nth-child(3){transform:rotate(-.08deg)}
  .tab:nth-child(4){transform:rotate(.12deg)}
  .tab .num{font-family:var(--mono);font-size:10px;color:var(--mute)}
  .tab.active{
    background:var(--paper);
    color:var(--ink);
    border-color:var(--ink);
    border-bottom:1px solid var(--paper);
    position:relative;top:1px;
    font-weight:600;
  }
  .tab.active .num{color:var(--accent)}

  /* ============ SHARED WIREFRAME PRIMITIVES ============ */
  .stage{
    padding:36px 28px 0 28px;
    max-width:1280px;margin:0 auto;
  }
  .direction-intro{
    display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:end;
    padding:0 4px 20px 4px;
    border-bottom:1px dashed var(--line);
    margin-bottom:32px;
  }
  .direction-intro h2{
    font-family:var(--hand);font-size:36px;margin:0;font-weight:700;
  }
  .direction-intro .tagline{
    font-family:var(--mono);font-size:11px;color:var(--mute);
    text-transform:uppercase;letter-spacing:.12em;margin-top:6px;
  }
  .direction-intro .desc{
    font-size:13px;color:var(--ink-2);max-width:560px;line-height:1.55;
    padding-bottom:4px;
  }
  .direction-intro .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .chip{
    font-family:var(--mono);font-size:10px;
    padding:4px 8px;border:1px solid var(--line);border-radius:20px;
    color:var(--mute);background:var(--fill);
  }

  .screen-label{
    display:flex;align-items:baseline;gap:14px;
    font-family:var(--mono);font-size:11px;color:var(--mute);
    text-transform:uppercase;letter-spacing:.12em;
    margin:40px 0 14px 0;
  }
  .screen-label .n{
    font-family:var(--hand);font-size:26px;color:var(--ink);
    text-transform:none;letter-spacing:0;line-height:1;
  }
  .screen-label .dash{flex:1;border-top:1px dashed var(--line);transform:translateY(-4px)}
  .screen-label .hint{font-family:var(--hand);font-size:15px;color:var(--mute);text-transform:none;letter-spacing:0}

  .frame{
    border:1.5px solid var(--ink);
    background:#fff;
    border-radius:3px;
    position:relative;
    box-shadow:3px 3px 0 var(--line-2);
  }
  .frame.tall{min-height:640px}
  .frame-chrome{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;
    border-bottom:1px solid var(--line);
    background:var(--fill);
    font-family:var(--mono);font-size:10px;color:var(--mute);
  }
  .dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--ink)}
  .frame-chrome .url{
    flex:1;background:#fff;border:1px solid var(--line);
    padding:2px 10px;border-radius:10px;
  }

  /* Greyscale boxes */
  .box{border:1px solid var(--ink);border-radius:2px;background:#fff}
  .box.fill{background:var(--fill)}
  .box.fill-2{background:var(--fill-2)}
  .box.dash{border-style:dashed}
  .label{font-family:var(--mono);font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.08em}
  .hand{font-family:var(--hand);color:var(--ink)}

  /* placeholder image */
  .ph{
    background:
      repeating-linear-gradient(135deg, transparent 0 8px, rgba(0,0,0,.05) 8px 9px),
      var(--fill);
    border:1px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:10px;color:var(--mute);
    text-align:center;padding:8px;
  }
  /* faux text lines */
  .lines{display:flex;flex-direction:column;gap:5px}
  .lines i{display:block;height:6px;background:var(--line-2);border-radius:3px}
  .lines i:nth-child(odd){width:92%}
  .lines i:nth-child(3n){width:74%}
  .lines i:nth-child(5n){width:86%}

  /* scoring primitives */
  .bar-track{height:6px;background:var(--fill);border:1px solid var(--line);border-radius:4px;position:relative;overflow:hidden}
  .bar-fill{height:100%;background:var(--ink)}
  .bar-fill.warn{background:var(--accent)}
  .bar-fill.good{background:var(--scope-you)}
  .bar-fill.bad{background:var(--scope-out)}

  /* scope-of-influence tags */
  .scope-tag{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10px;
    padding:3px 8px;border-radius:12px;
    border:1px solid var(--ink);
  }
  .scope-tag .sq{width:8px;height:8px;border-radius:2px}
  .scope-you{background:var(--scope-you-soft)}
  .scope-you .sq{background:var(--scope-you)}
  .scope-collab{background:var(--scope-collab-soft)}
  .scope-collab .sq{background:var(--scope-collab)}
  .scope-out{background:var(--scope-out-soft)}
  .scope-out .sq{background:var(--scope-out)}

  /* severity */
  .sev{font-family:var(--mono);font-size:10px;padding:2px 6px;border:1px solid var(--ink);border-radius:3px}
  .sev.high{background:var(--scope-out-soft)}
  .sev.med{background:var(--accent-soft)}
  .sev.low{background:var(--fill)}

  /* sticky note */
  .sticky{
    background:var(--accent-soft);
    border:1px solid var(--ink);
    padding:10px 12px;
    font-family:var(--hand);font-size:18px;line-height:1.2;
    box-shadow:2px 2px 0 rgba(0,0,0,.1);
    transform:rotate(-.8deg);
  }
  .sticky .kicker{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-2);display:block;margin-bottom:4px}

  /* arrow */
  .arrow{
    position:absolute;font-family:var(--hand);font-size:16px;color:var(--ink);
    pointer-events:none;
  }
  .arrow svg{display:block}

  /* ============ TWEAKS PANEL ============ */
  #tweaks{
    position:fixed;right:18px;bottom:18px;
    width:260px;background:#fff;border:1.5px solid var(--ink);
    border-radius:4px;box-shadow:3px 3px 0 var(--line-2);
    z-index:100;display:none;
    font-family:var(--sans);
  }
  #tweaks.on{display:block}
  #tweaks h3{margin:0;padding:10px 14px;border-bottom:1px solid var(--line);font-family:var(--hand);font-size:20px}
  #tweaks .row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px;font-size:12px;border-bottom:1px dashed var(--line-2)}
  #tweaks .row:last-child{border-bottom:none}
  #tweaks .row label{color:var(--ink-2)}
  #tweaks select,#tweaks input[type=range]{font-family:var(--mono);font-size:11px}
  .screens-hidden .frame{display:none}
</style>
</head>
<body>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <h1>Ethics &amp; Trust Analyzer</h1>
      <span class="sub">wireframes · v0.1 · for UX designers on cross-functional teams</span>
    </div>
    <div class="topbar-meta">
      3 screens × 4 directions<br/>
      Clean low-fi · Socratic tone
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="d1"><span class="num">01</span> Report Document</button>
    <button class="tab" data-tab="d2"><span class="num">02</span> Dashboard Grid</button>
    <button class="tab" data-tab="d3"><span class="num">03</span> Canvas Annotate</button>
    <button class="tab" data-tab="d4"><span class="num">04</span> Split Inspector</button>
  </nav>
</header>

<main class="stage" id="stage">
  <!-- direction panels injected below -->
</main>

<!-- Tweaks panel -->
<aside id="tweaks">
  <h3>Tweaks</h3>
  <div class="row">
    <label for="tw-screens">Show screens</label>
    <select id="tw-screens">
      <option value="all">All 3</option>
      <option value="overview">Overview only</option>
      <option value="deepdive">Deep-dive only</option>
      <option value="scope">Scope only</option>
    </select>
  </div>
  <div class="row">
    <label for="tw-paper">Paper tone</label>
    <select id="tw-paper">
      <option value="warm">Warm (default)</option>
      <option value="cool">Cool grey</option>
      <option value="plain">Plain white</option>
    </select>
  </div>
  <div class="row">
    <label for="tw-accent">Accent</label>
    <select id="tw-accent">
      <option value="amber">Amber</option>
      <option value="teal">Teal</option>
      <option value="plum">Plum</option>
      <option value="none">None (pure B&amp;W)</option>
    </select>
  </div>
  <div class="row">
    <label for="tw-skew">Sketch wobble</label>
    <input id="tw-skew" type="range" min="0" max="3" step="1" value="1" />
  </div>
</aside>

<script>
/* ============ DIRECTION BUILDERS ============ */

const stage = document.getElementById('stage');

/* shared helpers */
function el(tag, attrs={}, ...kids){
  const n = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') n.className = attrs[k];
    else if(k==='style') n.setAttribute('style', attrs[k]);
    else if(k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for(const kid of kids){
    if(kid==null) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return n;
}
</script>
<script>
/* ============================================================
   Ethics & Trust Analyzer — wireframe directions
   4 directions × 3 screens (Overview, Deep-dive, Scope)
   Clean low-fi greyscale with muted amber accent.
   ============================================================ */

/* ---------- SAMPLE DATA ---------- */
const SAMPLE = {
  artifact: "checkout_v3_figma.pdf",
  uploaded: "2026-04-18 · 14 screens parsed",
  overall: 62,
  pillars: [
    {key:"fair",   name:"Fairness",        score:71, findings:4, trend:"+3"},
    {key:"acc",    name:"Accountability",  score:48, findings:6, trend:"-2"},
    {key:"trans",  name:"Transparency",    score:55, findings:5, trend:"0"},
    {key:"expl",   name:"Explainability",  score:42, findings:7, trend:"-5"},
    {key:"trust",  name:"Trust calibration",score:66,findings:3, trend:"+1"},
    {key:"priv",   name:"Privacy",         score:74, findings:2, trend:"+2"},
    {key:"cons",   name:"Consent",         score:58, findings:4, trend:"0"},
    {key:"bias",   name:"Bias & inclusivity",score:63,findings:3,trend:"+1"},
    {key:"err",    name:"Error handling",  score:51, findings:5, trend:"-1"},
    {key:"dark",   name:"Dark patterns",   score:80, findings:1, trend:"+4"},
  ],
  findings: [
    {id:"F-03", sev:"high", pillar:"Explainability", screen:"Screen 07 — AI Suggestion",
     title:"AI suggestion offered without reasoning",
     scope:"you",
     summary:"The recommended item appears with no indication of why it was chosen. Users cannot calibrate trust.",
     ask:"What signal would help a user decide whether to accept this?",
     fix:"Add a one-line rationale (‘based on your last 3 orders’) adjacent to the suggestion. Link to fuller ‘Why this?’ sheet."},
    {id:"F-07", sev:"high", pillar:"Accountability", screen:"Screen 11 — Auto-approve",
     title:"No path to contest an automated decision",
     scope:"collab",
     summary:"Declined users see a dead-end message. Requires policy + eng work to implement an appeal route.",
     ask:"Who owns the appeal flow — legal, support, or product?",
     fix:"Coordinate with Legal & Support to add a ‘Request human review’ action. You own the entry point + copy."},
    {id:"F-11", sev:"med",  pillar:"Transparency", screen:"Screen 02 — Data prompt",
     title:"Data usage disclosed only in footer",
     scope:"you",
     summary:"A 9-pt footer link is the only mention that inputs train the model.",
     ask:"At what moment does the user most need this information?",
     fix:"Inline disclosure at point of input. Draft copy; partner with Content on final wording."},
    {id:"F-14", sev:"med",  pillar:"Consent", screen:"Screen 04 — Onboarding",
     title:"Consent bundled with Terms acceptance",
     scope:"out",
     summary:"Legal framework decision — separating these is set at the platform level.",
     ask:"Can you flag this upward even if you can’t change it?",
     fix:"Document and escalate to Legal/Privacy. Out of direct design scope."},
    {id:"F-18", sev:"low",  pillar:"Error handling", screen:"Screen 09 — Model timeout",
     title:"Generic error on model timeout",
     scope:"you",
     summary:"‘Something went wrong’ message doesn’t tell the user whether to retry or wait.",
     ask:"What do users need to do differently?",
     fix:"Write a specific, actionable error state. Coordinate copy with Eng on the underlying states."},
  ]
};

const SCOPE_LABEL = {
  you:   {name:"Your scope",       tag:"YOU OWN THIS",      cls:"scope-you"},
  collab:{name:"Collaborative",    tag:"WORK W/ OTHERS",    cls:"scope-collab"},
  out:   {name:"Out of scope",     tag:"ESCALATE / FLAG",   cls:"scope-out"},
};

/* ---------- UTIL ---------- */
function screenLabel(n, title, hint){
  return `
    <div class="screen-label" data-scroll="${title}">
      <span class="n">${n}.</span>
      <span>${title}</span>
      <span class="dash"></span>
      <span class="hint">${hint||""}</span>
    </div>`;
}

function frameShell(title, inner, extraClass=""){
  return `
  <section class="frame tall ${extraClass}" data-screen-label="${title}">
    <div class="frame-chrome">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="url">ethics.trust/analyze/checkout_v3</span>
      <span>${SAMPLE.artifact}</span>
    </div>
    <div class="frame-body">${inner}</div>
  </section>`;
}

function scopeChip(scope){
  const s = SCOPE_LABEL[scope];
  return `<span class="scope-tag ${s.cls}"><span class="sq"></span>${s.tag}</span>`;
}

/* =====================================================================
   DIRECTION 1 — REPORT DOCUMENT
   Long-scroll annotated audit report. Printable, clinical but warm.
===================================================================== */
function buildD1(){
  const over = `
    <div style="padding:28px 40px 36px 40px;max-width:780px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--ink);padding-bottom:14px">
        <div>
          <div class="label">ETHICS &amp; TRUST ASSESSMENT · V3</div>
          <div style="font-family:var(--hand);font-size:34px;line-height:1.1;margin-top:4px">Checkout flow, AI suggestions</div>
        </div>
        <div class="label" style="text-align:right;line-height:1.6">
          ${SAMPLE.uploaded}<br/>
          14 screens · 40 findings
        </div>
      </div>

      <div style="display:grid;grid-template-columns:180px 1fr;gap:28px;margin-top:26px">
        <div>
          <div class="label">OVERALL</div>
          <div style="font-family:var(--hand);font-size:72px;line-height:1;margin-top:4px">${SAMPLE.overall}<span style="font-size:28px;color:var(--mute)">/100</span></div>
          <div class="label" style="margin-top:4px">NEEDS ATTN.</div>
          <div class="bar-track" style="margin-top:10px"><div class="bar-fill warn" style="width:${SAMPLE.overall}%"></div></div>
        </div>
        <div>
          <div class="label">SOCRATIC SUMMARY</div>
          <p style="font-family:var(--hand);font-size:22px;line-height:1.35;margin:6px 0 10px 0">
            “Where in this flow would <u>you</u> most want to know how the AI made its choice?”
          </p>
          <div class="lines"><i></i><i></i><i></i><i></i><i></i></div>
        </div>
      </div>

      <div class="label" style="margin-top:34px">TABLE OF CONTENTS</div>
      <ol style="font-family:var(--mono);font-size:12px;columns:2;padding-left:22px;line-height:1.8;color:var(--ink-2)">
        ${SAMPLE.pillars.map((p,i)=>`<li>${p.name.padEnd(22,' ')} <span style="color:var(--mute)">· ${p.findings} findings</span></li>`).join("")}
      </ol>

      <div class="label" style="margin-top:30px">PILLAR BREAKDOWN</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
        ${SAMPLE.pillars.map(p=>`
          <div style="display:grid;grid-template-columns:170px 1fr 46px 40px;gap:14px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line-2)">
            <div style="font-size:13px">${p.name}</div>
            <div class="bar-track"><div class="bar-fill ${p.score<50?'bad':p.score<65?'warn':'good'}" style="width:${p.score}%"></div></div>
            <div class="label" style="text-align:right">${p.score}/100</div>
            <div class="label" style="color:${p.trend.startsWith('-')?'var(--scope-out)':'var(--scope-you)'}">${p.trend}</div>
          </div>`).join("")}
      </div>

      <div class="label" style="margin-top:30px">PRIORITY FINDINGS</div>
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:12px">
        ${SAMPLE.findings.slice(0,3).map(f=>`
          <div style="border:1px solid var(--ink);padding:14px 16px;display:grid;grid-template-columns:60px 1fr auto;gap:14px">
            <div style="font-family:var(--hand);font-size:26px;line-height:1">${f.id}</div>
            <div>
              <div style="font-size:13px;font-weight:600">${f.title}</div>
              <div class="label" style="margin-top:4px">${f.pillar} · ${f.screen}</div>
              <p style="font-size:12px;color:var(--ink-2);margin:6px 0 0 0;line-height:1.5">${f.summary}</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
              <span class="sev ${f.sev}">${f.sev.toUpperCase()}</span>
              ${scopeChip(f.scope)}
            </div>
          </div>`).join("")}
      </div>
    </div>`;

  const deep = `
    <div style="display:grid;grid-template-columns:260px 1fr;min-height:620px">
      <aside style="border-right:1px solid var(--line);background:var(--fill);padding:18px 14px">
        <div class="label">ALL FINDINGS · 40</div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px">
          ${SAMPLE.findings.map((f,i)=>`
            <div style="padding:8px 10px;border:1px solid ${i===0?'var(--ink)':'transparent'};background:${i===0?'#fff':'transparent'};border-radius:3px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span class="label">${f.id}</span>
                <span class="sev ${f.sev}">${f.sev[0].toUpperCase()}</span>
              </div>
              <div style="font-size:12px;margin-top:3px;line-height:1.3">${f.title}</div>
            </div>`).join("")}
        </div>
      </aside>
      <div style="padding:26px 32px;max-width:720px">
        <div class="label">FINDING F-03 · HIGH SEVERITY</div>
        <h2 style="font-family:var(--hand);font-size:34px;line-height:1.1;margin:4px 0 0 0">
          AI suggestion offered without reasoning
        </h2>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <span class="sev high">HIGH</span>
          <span class="chip">Explainability</span>
          <span class="chip">Screen 07</span>
          ${scopeChip("you")}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px">
          <div class="ph" style="height:220px">annotated screenshot · screen 07<br/>callout on suggestion card</div>
          <div>
            <div class="label">WHAT WE SEE</div>
            <p style="font-size:13px;line-height:1.55;color:var(--ink-2);margin:6px 0 14px 0">
              The recommended item appears with no indication of why it was chosen. Users cannot calibrate trust or correct the model’s assumption.
            </p>
            <div class="label">EVIDENCE</div>
            <ul style="font-family:var(--mono);font-size:11px;color:var(--ink-2);line-height:1.7;padding-left:18px;margin:6px 0 0 0">
              <li>Screen 07 — suggestion card, no rationale</li>

const BUILDERS = { d1:buildD1, d2:buildD2, d3:buildD3, d4:buildD4 };

function showDirection(id){
  stage.innerHTML = BUILDERS[id]();
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab===id);
  });
  localStorage.setItem('etl-dir', id);
  applyScreenFilter();
}

document.getElementById('tabs').addEventListener('click', (e)=>{
  const t = e.target.closest('.tab');
  if(!t) return;
  showDirection(t.dataset.tab);
});

const initial = localStorage.getItem('etl-dir') || 'd1';
showDirection(initial);

/* screen filter hook */
function applyScreenFilter(){
  const v = document.getElementById('tw-screens')?.value || 'all';
  const frames = stage.querySelectorAll('.frame');
  const labels = stage.querySelectorAll('.screen-label');
  frames.forEach((f,i)=>{
    const show = v==='all' || (v==='overview' && i===0) || (v==='deepdive' && i===1) || (v==='scope' && i===2);
    f.style.display = show ? '' : 'none';
    if(labels[i]) labels[i].style.display = show ? '' : 'none';
  });
}
window.__applyScreenFilter = applyScreenFilter;

    else{ document.documentElement.style.setProperty('--paper','#faf8f3'); document.documentElement.style.setProperty('--fill','#f3f2ef'); }

    // accent
    const a = v.accent;
    if(a==='teal'){ document.documentElement.style.setProperty('--accent','#2f6a6a'); document.documentElement.style.setProperty('--accent-soft','#d4e3e1'); }
    else if(a==='plum'){ document.documentElement.style.setProperty('--accent','#6a2f5a'); document.documentElement.style.setProperty('--accent-soft','#e8d4e1'); }
    else if(a==='none'){ document.documentElement.style.setProperty('--accent','#3a3a3a'); document.documentElement.style.setProperty('--accent-soft','#e6e6e6'); }
    else{ document.documentElement.style.setProperty('--accent','#b8761a'); document.documentElement.style.setProperty('--accent-soft','#f3e2c2'); }

    // wobble
    const w = parseInt(v.wobble,10) || 0;
    document.querySelectorAll('.tab').forEach((t,i)=>{
      const deg = (w===0?0 : ((i%2?-1:1) * 0.15 * w));
      t.style.transform = `rotate(${deg}deg)`;
    });
    document.querySelectorAll('.sticky').forEach((s,i)=>{
      const deg = (w===0?0 : ((i%2?-1:1) * 0.9 * w));
      s.style.transform = `rotate(${deg}deg)`;
    });

    // screens
    const sel = document.getElementById('tw-screens');
    if(sel) sel.value = v.screens;
    if(window.__applyScreenFilter) window.__applyScreenFilter();
  }

  const state = {...TWEAK_DEFAULTS};
  const stored = localStorage.getItem('etl-tweaks');
  if(stored){ try{ Object.assign(state, JSON.parse(stored)); }catch(e){} }

  // init control values
  document.getElementById('tw-screens').value = state.screens;
  document.getElementById('tw-paper').value = state.paper;
  document.getElementById('tw-accent').value = state.accent;
  document.getElementById('tw-skew').value = state.wobble;
  applyAll(state);

  function onChange(key){
    return (e)=>{
      state[key] = e.target.value;
      localStorage.setItem('etl-tweaks', JSON.stringify(state));
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:e.target.value}}, '*');
      applyAll(state);
    };
  }
  document.getElementById('tw-screens').addEventListener('change', onChange('screens'));
  document.getElementById('tw-paper').addEventListener('change', onChange('paper'));
  document.getElementById('tw-accent').addEventListener('change', onChange('accent'));
  document.getElementById('tw-skew').addEventListener('input', onChange('wobble'));

  // reapply on tab switch (new screens get inserted)
  const origShow = window.showDirection;
  const obs = new MutationObserver(()=>applyAll(state));
  obs.observe(document.getElementById('stage'), {childList:true});
})();

</script>
</body>
</html>
